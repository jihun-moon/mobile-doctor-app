name: Discord notify

on:
  push:
    branches: [main]
  release:
    types: [published]
  pull_request:
    types: [opened, closed]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          EVENT: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          URL: ${{ github.event.compare || github.event.release.html_url || github.event.pull_request.html_url || github.event.repository.html_url }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK secret not set — skipping (configure in repo Settings → Secrets to enable)."
            exit 0
          fi
          MSG="**[$REPO]** \`$EVENT\` on \`$REF\` by **$ACTOR**\n$URL"
          curl -fsSL -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}" \
            "$DISCORD_WEBHOOK"
