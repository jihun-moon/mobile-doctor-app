name: Discord notify

on:
  push:
    branches: [main]
  release:
    types: [published]
  pull_request:
    types: [opened, closed]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          URL: ${{ github.event.pull_request.html_url || github.event.release.html_url || github.event.compare || github.event.repository.html_url }}
        run: |
          set -u
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "DISCORD_WEBHOOK not set — skipping (configure in repo Settings → Secrets to enable)."
            exit 0
          fi
          # Strip any whitespace/CR/LF from secret (in case it was set with trailing newline)
          WEBHOOK="$(printf '%s' "$DISCORD_WEBHOOK" | tr -d '[:space:]')"
          # Build JSON safely with jq (avoids shell escaping pitfalls)
          payload=$(jq -nc \
            --arg repo  "$REPO"  \
            --arg event "$EVENT" \
            --arg ref   "$REF"   \
            --arg actor "$ACTOR" \
            --arg url   "$URL"   \
            '{content: "**[\($repo)]** `\($event)` on `\($ref)` by **\($actor)**\n\($url)"}')
          # Use POST + show http code, fail on 4xx/5xx
          http=$(curl -sS -o /tmp/disc_resp -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            -d "$payload" "$WEBHOOK")
          echo "Discord HTTP: $http"
          if [ "$http" != "204" ] && [ "$http" != "200" ]; then
            cat /tmp/disc_resp
            exit 1
          fi
